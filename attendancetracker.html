<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <title>Attendance Tracker</title>

        <style>
        body {
            font-family: "Google Sans", sans-serif;
            background: #f9eae1; 
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: flex;
            gap: 120px;
            align-items: center;
            margin-top: 60px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            width: 320px;
            height: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #7d4f50; 
        }

        select, input {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #aa998f; 
            font-size: 14px;
            width: 100%;
            background: #fff;
            color: #7d4f50;
        }

        button {
            margin-top: 10px;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #aa998f; 
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.85;
        }

        #plot-area {
            width: 520px;
            height: 340px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

       
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #7d4f50;
            box-sizing: border-box;
            z-index: 1000;
        }

        .nav-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 8px 15px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            background-color: #aa998f;
        }

        .nav-btn:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="nav-title">School System</div>
    <div class="nav-buttons">
        <a href="index.html" class="nav-btn">Classmates</a>
        <a href="attendancetracker.html" class="nav-btn">Attendance Tracker</a>
        <a href="gallery.html" class="nav-btn">Gallery</a>
    </div>
</nav>

<div class="container">

    
    <div class="card">
        <h2>Attendance Tracker</h2>

        <div class="controls">
            <select id="day">
                <option value="monday">Monday</option>
                <option value="tuesday">Tuesday</option>
                <option value="wednesday">Wednesday</option>
                <option value="thursday">Thursday</option>
                <option value="friday">Friday</option>
            </select>

            <input type="number" id="num" value="0">

            <button onclick="plot()">Submit</button>
        </div>
    </div>

   
    <div id="plot-area"></div>

</div>


<py-config>
packages = ["numpy", "matplotlib"]
</py-config>


<py-script src="attendance.py"></py-script>

</body>
</html>
